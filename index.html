<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="예약문자">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>민박 예약 문자 보내기</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF6B4A;
  --accent2:#FF8C6B;
  --ink:#1C1C1E;
  --ink2:#3a3a3c;
  --ink-light:#8E8E93;
  --border:#E5E5EA;
  --bg:#F2F2F7;
  --card:#FFFFFF;
  --cream:#F8F8FC;
  --shadow:rgba(0,0,0,0.07);
  --shadow2:rgba(0,0,0,0.13);
  --radius:16px;
  --c1:#5B8DB8;--c2:#7A5C3A;--c3:#4A6741;--c4:#9B6B4A;--c5:#6B5B8B;--c6:#B8734A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px);}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,#FF6B4A 0%,#FF8C6B 100%);
  padding:0 18px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(255,107,74,0.3);
}
.hdr-row{display:flex;align-items:center;justify-content:space-between;height:58px;}
.hdr-title{font-size:17px;font-weight:700;color:white;letter-spacing:-.3px;}
.hdr-set-btn{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.22);
  border:1.5px solid rgba(255,255,255,0.4);
  border-radius:20px;padding:6px 13px;
  color:white;font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}
.hdr-set-btn:active{background:rgba(255,255,255,0.35);}

/* ── STAGE TABS ── */
.stabs{
  display:flex;overflow-x:auto;
  background:white;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
  position:sticky;top:58px;z-index:50;
  padding:0 8px;
}
.stabs::-webkit-scrollbar{display:none;}
.stab{
  flex:none;padding:13px 14px;
  font-size:12px;font-weight:500;color:var(--ink-light);
  border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;font-family:'Noto Sans KR',sans-serif;
  transition:color .15s;
}
.stab .ti{font-size:14px;margin-right:3px;}
.stab.active{color:var(--ink);font-weight:700;}
.stab:nth-child(1).active{border-bottom-color:var(--c1);}
.stab:nth-child(2).active{border-bottom-color:var(--c2);}
.stab:nth-child(3).active{border-bottom-color:var(--c3);}
.stab:nth-child(4).active{border-bottom-color:var(--c4);}
.stab:nth-child(5).active{border-bottom-color:var(--c5);}
.stab:nth-child(6).active{border-bottom-color:var(--c6);}

/* ── MAIN ── */
main{padding:16px 14px 0;}

/* ── GUEST PANEL ── */
.guest-panel{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px 16px 16px;
  margin-bottom:14px;
  box-shadow:0 2px 12px var(--shadow);
}
.gp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.gp-title{font-size:12px;font-weight:700;color:var(--ink-light);letter-spacing:.06em;text-transform:uppercase;}
.gp-clear{
  background:none;border:1px solid var(--border);
  border-radius:20px;padding:4px 12px;
  font-size:11px;color:var(--ink-light);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}
.gp-clear:active{background:var(--bg);}

/* ── FORM FIELDS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fi{display:flex;flex-direction:column;gap:5px;}
.fi label{font-size:11px;font-weight:600;color:var(--ink-light);padding-left:2px;}
.fi-input{
  position:relative;display:flex;align-items:center;
  background:var(--cream);
  border:1.5px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:border-color .15s;
}
.fi-input:focus-within{border-color:var(--accent);}
.fi-icon{padding:0 10px 0 12px;font-size:15px;flex-shrink:0;}
.fi-input input,.fi-input select{
  flex:1;border:none;background:none;
  padding:11px 12px 11px 0;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);outline:none;width:100%;
}
.fi-input select{padding-right:8px;}

/* ── DATE BTN ── */
.date-btn{
  background:var(--cream);border:1.5px solid var(--border);
  border-radius:12px;padding:11px 14px;
  cursor:pointer;min-height:46px;
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .15s;
}
.date-btn:active{border-color:var(--accent);}
.drb-placeholder{font-size:13px;color:#B0B0B8;}
.drb-side{display:flex;flex-direction:column;gap:2px;}
.drb-label{font-size:10px;color:var(--ink-light);font-weight:600;}
.drb-date{font-size:14px;font-weight:700;color:var(--ink);}
.drb-mid{display:flex;flex-direction:column;align-items:center;padding:0 10px;gap:2px;}
.drb-arrow{font-size:13px;color:var(--ink-light);}
.drb-nights{font-size:11px;font-weight:700;color:var(--accent);}

/* ── STAGE CONTENT ── */
.stage-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.stage-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.stage-meta h2{font-size:16px;font-weight:700;}
.stage-desc{font-size:12px;color:var(--ink-light);margin-bottom:14px;padding-left:17px;}

/* ── CARDS ── */
.card{
  background:var(--card);
  border-radius:var(--radius);
  margin-bottom:10px;
  box-shadow:0 2px 10px var(--shadow);
  overflow:hidden;
}
.card-h{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 16px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}
.card-h:active{background:var(--bg);}
.card-badge{
  display:flex;align-items:center;gap:8px;flex:1;min-width:0;
}
.card-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--bg);
  font-size:11px;font-weight:700;color:var(--ink-light);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-t{font-size:14px;font-weight:600;color:var(--ink);flex:1;min-width:0;}
.card-tog{font-size:11px;color:var(--ink-light);transition:transform .2s;flex-shrink:0;padding:4px;}
.card-tog.open{transform:rotate(180deg);}
.card-b{display:none;padding:0 16px 16px;}
.card-b.open{display:block;}
.tpl-text{
  white-space:pre-wrap;font-size:13px;line-height:1.75;
  color:var(--ink2);
  background:var(--cream);
  border-radius:10px;padding:14px;
  border:1px solid var(--border);
}
.card-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;}
.btn{
  padding:9px 15px;border-radius:20px;border:none;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  transition:opacity .15s;
}
.btn:active{opacity:.75;}
.btn-copy{background:#3a3a3c;color:white;}
.btn-sms{background:linear-gradient(135deg,#34C759,#28A745);color:white;}
.btn-edit{background:var(--bg);color:var(--ink-light);border:1px solid var(--border);}
.btn-save{background:#007AFF;color:white;}
.btn-cancel{background:var(--bg);color:var(--ink-light);}
.btn-del{background:#FFE8E8;color:#EF4444;}
.tpl-edit{
  width:100%;min-height:130px;
  border:1.5px solid var(--border);
  border-radius:10px;padding:12px;
  font-size:13px;font-family:'Noto Sans KR',sans-serif;
  resize:vertical;margin-top:8px;outline:none;
  line-height:1.7;
}
.tpl-edit:focus{border-color:var(--accent);}
.tpl-title-edit{
  width:100%;border:1.5px solid var(--border);
  border-radius:10px;padding:10px 12px;
  font-size:13px;font-family:'Noto Sans KR',sans-serif;
  margin-bottom:4px;outline:none;
}
.tpl-title-edit:focus{border-color:var(--accent);}

/* ── VAR CHIPS ── */
.var-chips-wrap{margin-top:10px;background:#fff7f5;border:1.5px solid #ffd5cc;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:10px;}
.var-chips-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:4px;opacity:.8;}
.var-chips{display:flex;flex-wrap:wrap;gap:5px;}
.var-chip{
  padding:5px 11px;
  background:white;border:1.5px solid #ffb8a8;
  border-radius:20px;font-size:11px;color:var(--accent);
  cursor:pointer;font-weight:700;box-shadow:0 1px 3px rgba(255,107,74,.1);
  transition:background .15s,transform .1s;
}
.var-chip:active{background:#FF6B4A;color:white;transform:scale(.95);}
.emoji-section{border-top:1px solid #ffd5cc;padding-top:10px;}
.emoji-chip{
  padding:4px 7px;font-size:17px;
  background:white;border:1.5px solid #ffe5dd;
  border-radius:10px;cursor:pointer;
  transition:transform .1s;
}
.emoji-chip:active{transform:scale(.85);}

/* ── ADD TEMPLATE ── */
.btn-add-tpl{
  display:block;width:100%;padding:13px;
  border:2px dashed var(--border);
  border-radius:var(--radius);
  background:none;font-size:13px;color:var(--ink-light);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  margin-top:4px;margin-bottom:24px;
}
.btn-add-tpl:active{background:var(--bg);}

/* ── SETTINGS PANEL ── */
.set-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.set-overlay.open{opacity:1;pointer-events:auto;}
.set-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg);
  border-radius:24px 24px 0 0;
  z-index:201;max-height:92vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,.72,0,1);
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
}
.set-panel.open{transform:translateY(0);}

/* 드래그 핸들 */
.set-handle{width:36px;height:4px;background:#D1D1D6;border-radius:2px;margin:12px auto 4px;}

.set-head{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px;}
.set-head h2{font-size:19px;font-weight:700;}
.set-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--bg);border:none;
  font-size:16px;color:var(--ink-light);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.set-body{padding:0 16px;}

/* 설정 섹션 그룹 헤더 */
.set-group-label{
  font-size:11px;font-weight:700;color:var(--ink-light);
  letter-spacing:.07em;text-transform:uppercase;
  padding:0 4px;margin:16px 0 6px;
}
.set-group-label:first-child{margin-top:0;}

/* 설정 카드 */
.set-card{
  background:var(--card);border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 1px 8px var(--shadow);
  margin-bottom:8px;
}
.set-field{
  display:flex;align-items:center;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  gap:12px;
}
.set-field:last-child{border-bottom:none;}
.set-field-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
.set-field-body{flex:1;min-width:0;}
.set-field-label{font-size:11px;font-weight:600;color:var(--ink-light);margin-bottom:3px;}
.set-field input{
  width:100%;border:none;background:none;
  font-size:15px;font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);outline:none;
}
.set-field input::placeholder{color:#C7C7CC;}

.btn-primary{
  display:block;width:100%;
  padding:15px;
  background:linear-gradient(135deg,#FF6B4A,#FF8C6B);
  color:white;border:none;border-radius:14px;
  font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  margin-top:16px;
  box-shadow:0 4px 14px rgba(255,107,74,0.35);
}
.btn-primary:active{opacity:.85;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(28,28,30,0.92);
  backdrop-filter:blur(10px);
  color:white;padding:10px 22px;
  border-radius:22px;font-size:13px;font-weight:600;
  opacity:0;transition:all .28s;z-index:999;
  white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal{background:white;border-radius:20px;padding:24px;width:100%;max-width:340px;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:14px;color:var(--ink-light);margin-bottom:20px;white-space:pre-line;line-height:1.6;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.modal-btn-cancel{background:var(--bg);color:var(--ink-light);}
.modal-btn-ok{background:var(--accent);color:white;}

</style>
</head>
<body>

<header>
  <div class="hdr-row">
    <div style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;line-height:1.2;">
      <span style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:1.2px;text-transform:uppercase;margin-left:2px;">Stay_Msg_V1</span>
      <span class="hdr-title" style="font-size:18px;font-weight:800;letter-spacing:-.3px;">🏡 숙소 예약 문자</span>
    </div>
    <button class="hdr-set-btn" onclick="openSettings()">⚙️ 설정</button>
  </div>
</header>

<div class="stabs" id="stageTabs"></div>

<main>
  <!-- 손님 정보 입력 -->
  <div class="guest-panel">
    <div class="gp-head">
      <span class="gp-title">손님 정보</span>
      <button class="gp-clear" onclick="clearForm()">✕ 지우기</button>
    </div>
    <div class="form-grid">
      <div class="fi">
        <label>손님 이름</label>
        <div class="fi-input">
          <span class="fi-icon">👤</span>
          <input type="text" id="v_name" placeholder="홍길동" oninput="renderStage()" onkeydown="if(event.key==='Enter')document.getElementById('v_phone').focus()" autocomplete="off">
        </div>
      </div>
      <div class="fi">
        <label>연락처</label>
        <div class="fi-input">
          <span class="fi-icon">📞</span>
          <input type="tel" id="v_phone" placeholder="010-0000-0000" oninput="fmtPhone(this)" maxlength="13" onkeydown="if(event.key==='Enter')document.getElementById('dateRangeBtn').click()">
        </div>
      </div>
      <div class="fi" style="grid-column:1/-1;">
        <label>입실 · 퇴실 날짜</label>
        <div class="date-btn" id="dateRangeBtn" onclick="openDatePicker()">
          <div class="drb-placeholder">📅 날짜를 선택하세요</div>
        </div>
        <input type="hidden" id="v_checkin">
        <input type="hidden" id="v_checkout">
      </div>
      <div class="fi">
        <label>총인원</label>
        <div class="fi-input">
          <span class="fi-icon">👥</span>
          <select id="v_guests" onchange="renderStage()">
            <option value="">선택</option>
            <option>1명</option><option>2명</option><option>3명</option><option>4명</option>
            <option>5명</option><option>6명</option><option>7명</option><option>8명</option>
          </select>
        </div>
      </div>
      <div class="fi">
        <label>숙박 금액</label>
        <div class="fi-input">
          <span class="fi-icon">💰</span>
          <input type="text" id="v_price" inputmode="numeric" placeholder="예: 150,000원" onfocus="this.value=this.value.replace(/[^0-9]/g,'')" onblur="fmtPrice(this);renderStage()" oninput="renderStage()" onkeydown="if(event.key==='Enter')this.blur()">
        </div>
      </div>
    </div>
  </div>

  <!-- 스테이지 콘텐츠 -->
  <div id="stageContent"></div>
</main>

<!-- 설정 패널 -->
<div class="set-overlay" id="setOverlay" onclick="closeSettings()"></div>
<div class="set-panel" id="setPanel">
  <div class="set-handle"></div>
  <div class="set-head">
    <h2>⚙️ 설정</h2>
    <button class="set-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="set-body">

    <div class="set-group-label">🏡 숙소 정보</div>
    <div class="set-card">
      <div class="set-field">
        <span class="set-field-icon">🏡</span>
        <div class="set-field-body">
          <div class="set-field-label">숙소 이름</div>
          <input type="text" id="cfg_name" placeholder="예: 솔숲 스테이" onkeydown="if(event.key==='Enter')document.getElementById('cfg_addr').focus()">
        </div>
      </div>
      <div class="set-field">
        <span class="set-field-icon">📍</span>
        <div class="set-field-body">
          <div class="set-field-label">주소</div>
          <input type="text" id="cfg_addr" placeholder="예: 경남 산청군 ..." onkeydown="if(event.key==='Enter')document.getElementById('cfg_account').focus()">
        </div>
      </div>
      <div class="set-field">
        <span class="set-field-icon">🏦</span>
        <div class="set-field-body">
          <div class="set-field-label">계좌번호</div>
          <input type="text" id="cfg_account" placeholder="예: 국민 123-456-789" onkeydown="if(event.key==='Enter')document.getElementById('cfg_wifi').focus()">
        </div>
      </div>
    </div>

    <div class="set-group-label">🔐 입실 정보</div>
    <div class="set-card">
      <div class="set-field">
        <span class="set-field-icon">📶</span>
        <div class="set-field-body">
          <div class="set-field-label">와이파이 이름</div>
          <input type="text" id="cfg_wifi" placeholder="예: solsoop_5G" onkeydown="if(event.key==='Enter')document.getElementById('cfg_wifipw').focus()">
        </div>
      </div>
      <div class="set-field">
        <span class="set-field-icon">🔑</span>
        <div class="set-field-body">
          <div class="set-field-label">와이파이 비밀번호</div>
          <input type="text" id="cfg_wifipw" placeholder="예: 12345678" onkeydown="if(event.key==='Enter')document.getElementById('cfg_door').focus()">
        </div>
      </div>
      <div class="set-field">
        <span class="set-field-icon">🚪</span>
        <div class="set-field-body">
          <div class="set-field-label">도어락 비밀번호</div>
          <input type="text" id="cfg_door" placeholder="예: 1234#" style="margin-bottom:8px;" onkeydown="if(event.key==='Enter')document.getElementById('cfg_pw').focus()">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#555;">
            <input type="checkbox" id="cfg_door_auto" onchange="toggleDoorAuto()" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;">
            손님 전화번호 뒷자리 자동 사용
          </label>
        </div>
      </div>
    </div>

    <div class="set-group-label">💰 요금 정보</div>
    <div class="set-card">
      <div class="set-field">
        <span class="set-field-icon">📅</span>
        <div class="set-field-body">
          <div class="set-field-label">주중 요금</div>
          <input type="text" id="cfg_pw" inputmode="numeric" placeholder="예: 100,000원" onfocus="this.value=this.value.replace(/[^0-9]/g,'')" onblur="fmtPrice(this)" onkeydown="if(event.key==='Enter')document.getElementById('cfg_pwe').focus()">
        </div>
      </div>
      <div class="set-field">
        <span class="set-field-icon">🌅</span>
        <div class="set-field-body">
          <div class="set-field-label">주말 요금</div>
          <input type="text" id="cfg_pwe" inputmode="numeric" placeholder="예: 150,000원" onfocus="this.value=this.value.replace(/[^0-9]/g,'')" onblur="fmtPrice(this)" onkeydown="if(event.key==='Enter'){this.blur();saveSettings();}">

      <button onclick="exportData()" style="flex:1;padding:13px;background:#f0f4ff;border:1.5px solid #c0d0ff;border-radius:var(--radius);color:#3355cc;font-weight:700;font-size:14px;cursor:pointer;">📤 내보내기</button>
      <button onclick="document.getElementById('importFile').click()" style="flex:1;padding:13px;background:#f0fff4;border:1.5px solid #b0e8c0;border-radius:var(--radius);color:#226633;font-weight:700;font-size:14px;cursor:pointer;">📥 가져오기</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(this)">

</div>

<script>
const SK_SET='solsoop_set_v1';
const SK_TPL='solsoop_tpl_v1';

let settings={name:'',addr:'',account:'',wifi:'',wifipw:'',door:'',doorAuto:false,pw:'',pwe:''};
let childCount=0;
let curStage=0;
let editState={};
let customs={};

const STAGES=[
  {id:'inquiry',icon:'💬',label:'문의',color:'#5B8DB8',desc:'처음 문의 시 보내는 안내 문자예요.',
   templates:[
    {title:'기본 소개',body:`안녕하세요, {이름}님! 😊\n{숙소}입니다.\n\n문의 주셔서 감사해요 🙏\n\n📍 위치: {주소}\n💰 요금: 주중 {주중요금} / 주말 {주말요금}\n🅿️ 주차 가능\n\n날짜와 인원 알려주시면 바로 확인해 드릴게요 😊`},
    {title:'가격·예약 안내',body:`{이름}님, 반갑습니다 🌿\n\n【 예약 안내 】\n• 입실: 오후 3시 이후\n• 퇴실: 오전 11시까지\n• 예약금: 숙박비의 50% 선입금\n• 계좌: {계좌}\n\n날짜와 인원 알려주시면 바로 확인해 드릴게요 😊`}
  ]},
  {id:'prebook',icon:'📋',label:'예약전',color:'#7A5C3A',desc:'날짜 확인 및 예약금 안내 문자예요.',
   templates:[
    {title:'날짜 확인 및 예약금 요청',body:`{이름}님, 좋은 소식이에요! 😊\n\n{입실} ~ {퇴실} ({인원}) 예약 가능합니다 ✅\n\n【 예약금 입금 안내 】\n총 금액: {금액}\n예약금: {금액}의 50%\n계좌: {계좌}\n\n입금 확인 후 예약 확정 문자 드릴게요 🙏`},
    {title:'날짜 불가 안내',body:`{이름}님, 안녕하세요 😔\n\n죄송하게도 {입실} ~ {퇴실}은 이미 예약된 날짜예요.\n\n다른 날짜로 원하신다면 말씀해 주세요.\n좋은 날에 꼭 뵙고 싶습니다 🍃`}
  ]},
  {id:'booked',icon:'✅',label:'예약확정',color:'#4A6741',desc:'예약금 입금 확인 후 보내는 확정 문자예요.',
   templates:[
    {title:'예약 확정 안내',body:`{이름}님, 예약이 확정됐어요 🎉\n\n【 예약 내역 】\n📅 입실: {입실} 오후 3시 이후\n📅 퇴실: {퇴실} 오전 11시까지\n👥 인원: {인원}\n💰 잔금: {금액} (입실 당일)\n\n좋은 시간 되실 거예요 🌿`},
    {title:'예약 확정 + 취소 정책',body:`{이름}님, 예약 완료됐습니다 ✅\n\n입실 {입실} / 퇴실 {퇴실}\n인원 {인원} | 총 금액 {금액}\n\n【 취소 정책 】\n• 7일 전: 전액 환불\n• 3~6일 전: 50% 환불\n• 2일 이내: 환불 불가\n\n문의: {연락처} 😊`}
  ]},
  {id:'precheckin',icon:'🗺️',label:'입실전',color:'#9B6B4A',desc:'입실 전날 또는 당일 보내는 안내 문자예요.',
   templates:[
    {title:'입실 전날 안내',body:`{이름}님, 내일 뵙겠습니다 😊🌿\n\n📍 주소: {주소}\n🚗 네이버지도 검색: {숙소}\n🅿️ 마당 주차 가능\n\n궁금한 점 있으시면 편하게 문자 주세요! 🏡`},
    {title:'당일 입실 안내',body:`{이름}님, 오늘 오시는 날이네요 🎊\n\n입실: 오후 3시 이후\n잔금: {금액} (현장 수령)\n\n【 도착하시면 】\n대문 비밀번호: {비번}\n열쇠는 현관 안쪽에 있어요.\n\n솔숲의 맑은 공기 환영합니다 🌄`}
  ]},
  {id:'checkedin',icon:'🏡',label:'입실후',color:'#6B5B8B',desc:'체크인 후 편의시설 안내 문자예요.',
   templates:[
    {title:'체크인 완료 + 이용 안내',body:`{이름}님, 잘 도착하셨나요? 😊\n\n【 이용 안내 】\n🌡 에어컨·난방: 리모컨 사용\n🔥 바베큐: 마당에서 가능\n🧺 세탁기: 세탁실 이용 가능\n📶 와이파이: {와이파이} / {와이파이비번}\n🚭 실내 금연\n\n솔숲에서 좋은 추억 만드세요 🌲`},
    {title:'주변 관광·맛집 안내',body:`{이름}님 안녕하세요 😊\n\n【 주변 추천 】\n🍽 식사: 근처 식당 이용 가능\n🛒 마트: 도보 이용 가능\n🌊 관광: 주변 관광지 추천\n\n불편한 점 있으시면 바로 연락 주세요!`}
  ]},
  {id:'checkout',icon:'🙏',label:'퇴실',color:'#B8734A',desc:'퇴실 후 감사 인사 문자예요.',
   templates:[
    {title:'퇴실 감사 인사',body:`{이름}님, 이용해 주셔서 감사해요 🙏🌿\n\n즐거운 시간 되셨으면 좋겠어요.\n다음에 또 솔숲에 오시면 꼭 들러주세요 😊\n\n편안하게 잘 돌아가세요 🚗\n고맙습니다 ❤️`},
    {title:'감사 + 후기 요청',body:`{이름}님, 머물다 가셔서 감사합니다 🙏\n\n네이버지도에 후기 남겨주시면 큰 힘이 돼요 ⭐\n\n다음에 오실 때는 단골 할인 드릴게요! 😊`},
    {title:'퇴실 전날 알림',body:`{이름}님, 내일이 퇴실 날이네요 😊\n\n퇴실 시간: 내일 오전 11시\n\n【 퇴실 시 부탁드려요 】\n• 쓰레기 봉투에 담아 문 앞 배출\n• 열쇠 현관 안쪽에 걸어두기\n• 가스 밸브 잠금 확인\n\n함께해서 행복했어요 🌿`}
  ]}
];

const VAR_LIST=['{이름}','{입실}','{퇴실}','{인원}','{금액}','{연락처}','{숙소}','{주소}','{계좌}','{와이파이}','{와이파이비번}','{비번}','{전번뒷자리}','{주중요금}','{주말요금}'];

function loadAll(){
  try{const s=localStorage.getItem(SK_SET);if(s)settings={...settings,...JSON.parse(s)};}catch(e){}
  try{
    const t=localStorage.getItem(SK_TPL);
    if(t){
      const d=JSON.parse(t);
      if(d.bodies)STAGES.forEach(s=>{const b=d.bodies[s.id];if(b)s.templates.forEach((t,i)=>{if(b[i]!==undefined)t.body=b[i];});});
      if(d.titles)STAGES.forEach(s=>{const tt=d.titles[s.id];if(tt)s.templates.forEach((t,i)=>{if(tt[i]!==undefined)t.title=tt[i];});});
      if(d.customs)customs=d.customs;
    }
  }catch(e){}
}
function saveTplStorage(){
  const d={bodies:{},titles:{},customs};
  STAGES.forEach(s=>{d.bodies[s.id]=s.templates.map(t=>t.body);d.titles[s.id]=s.templates.map(t=>t.title);});
  localStorage.setItem(SK_TPL,JSON.stringify(d));
}

function fmtPhone(el){
  let v=el.value.replace(/\D/g,'').slice(0,11),r='';
  if(v.length<=3)r=v;
  else if(v.length<=7)r=v.slice(0,3)+'-'+v.slice(3);
  else r=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  el.value=r;renderStage();
}
function parseNum(s){return parseInt(String(s||'').replace(/[^0-9]/g,''))||0;}

function applyVars(raw){
  const ci=document.getElementById('v_checkin').value;
  const co=document.getElementById('v_checkout').value;
  const DOW=['일','월','화','수','목','금','토'];
  function fmt(ds){if(!ds)return'';const d=new Date(ds+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일(${DOW[d.getDay()]})`;}
  const map={
    '{이름}':document.getElementById('v_name').value||'{이름}',
    '{연락처}':document.getElementById('v_phone').value||'{연락처}',
    '{입실}':fmt(ci)||'{입실}',
    '{퇴실}':fmt(co)||'{퇴실}',
    '{인원}':document.getElementById('v_guests').value||'{인원}',
    '{금액}':document.getElementById('v_price').value||'{금액}',
    '{숙소}':settings.name||'{숙소}',
    '{주소}':settings.addr||'{주소}',
    '{계좌}':settings.account||'{계좌}',
    '{와이파이}':settings.wifi||'{와이파이}',
    '{와이파이비번}':settings.wifipw||'{와이파이비번}',
    '{전번뒷자리}':(()=>{const p=document.getElementById('v_phone').value.replace(/\D/g,'');return p.length>=4?p.slice(-4):'{전번뒷자리}';})(),
    '{비번}':(()=>{if(settings.doorAuto){const p=document.getElementById('v_phone').value.replace(/\D/g,'');return p.length>=4?p.slice(-4):'{비번}';}return settings.door||'{비번}';})(),
    '{주중요금}':settings.pw||'{주중요금}',
    '{주말요금}':settings.pwe||'{주말요금}',
  };
  return raw.replace(/\{[^}]+\}/g,m=>map[m]!==undefined?map[m]:m);
}
const EMOJI_LIST=['😊','🙏','✅','🎉','🌿','🏡','📅','👥','💰','🚗','🅿️','📶','🔥','🌊','⭐','❤️','😔','🍃','🌄','🌲','🛒','🍽️','🧺','🚭','📍','💬','📋','🎊','😄','🙌'];
function varChipsHtml(taId){
  const vars=`<div><div class="var-chips-label">📌 변수 (탭하면 입력)</div><div class="var-chips">${VAR_LIST.map(v=>`<button class="var-chip" onclick="insertVar('${v}','${taId}')">${v}</button>`).join('')}</div></div>`;
  const emojis=`<div class="emoji-section"><div class="var-chips-label">😊 이모티콘</div><div class="var-chips">${EMOJI_LIST.map(e=>`<button class="emoji-chip" onclick="insertVar('${e}','${taId}')">${e}</button>`).join('')}</div></div>`;
  return`<div class="var-chips-wrap">${vars}${emojis}</div>`;
}
function insertVar(v,taId){
  const ta=document.getElementById(taId);if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.slice(0,s)+v+ta.value.slice(e);
  ta.selectionStart=ta.selectionEnd=s+v.length;ta.focus();
}

function buildTabs(){
  document.getElementById('stageTabs').innerHTML=STAGES.map((s,i)=>
    `<button class="stab${i===0?' active':''}" onclick="switchStage(${i})"><span class="ti">${s.icon}</span>${s.label}</button>`
  ).join('');
}
function switchStage(i){
  curStage=i;
  document.querySelectorAll('.stab').forEach((t,j)=>t.classList.toggle('active',j===i));
  renderStage();
}
function allTpls(s){return[...s.templates,...(customs[s.id]||[])];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function togCard(key){
  const b=document.getElementById('body-'+key);
  const t=document.getElementById('tog-'+key);
  if(b)b.classList.toggle('open');
  if(t)t.classList.toggle('open');
}

function fmtPriceVal(v){const raw=v.replace(/[^\d]/g,'');return raw?Number(raw).toLocaleString('ko-KR')+'원':'';}
function fmtPrice(el){el.value=fmtPriceVal(el.value);}
function renderStage(){
  const s=STAGES[curStage];
  const tmpls=allTpls(s);
  const orig=s.templates.length;
  let html=`<div class="stage-meta"><div class="stage-dot" style="background:${s.color}"></div><h2>${s.icon} ${s.label}</h2></div><p class="stage-desc">${s.desc}</p>`;
  tmpls.forEach((t,i)=>{
    const key=`${s.id}-${i}`;
    const isEd=editState[key]!==undefined;
    const raw=isEd?editState[key]:t.body;
    const rend=applyVars(raw);
    const isC=i>=orig;
    html+=`<div class="card">
      <div class="card-h" onclick="togCard('${key}')" tabindex="0" onkeydown="if(event.key==='Enter')togCard('${key}')" role="button">
        <div class="card-badge">
          <span class="card-num">${i+1}</span>
          <span class="card-t">${esc(t.title)}</span>
        </div>
        <span class="card-tog ${i===0?'open':''}" id="tog-${key}">▾</span>
      </div>
      <div class="card-b ${i===0?'open':''}" id="body-${key}">
        ${isEd
          ?`<input class="tpl-title-edit" id="etitle-${key}" value="${esc(t.title)}" placeholder="템플릿 제목">
             <textarea class="tpl-edit" id="edit-${key}">${esc(raw)}</textarea>${varChipsHtml('edit-'+key)}`
          :`<div class="tpl-text">${esc(rend)}</div>`}
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyTpl('${key}',${i})">📋 복사</button>
          <button class="btn btn-sms" onclick="openSms('${key}',${i})">📱 문자</button>
          ${isEd
            ?`<button class="btn btn-save" onclick="saveEdit('${key}',${i})">저장</button><button class="btn btn-cancel" onclick="cancelEdit('${key}')">취소</button>`
            :`<button class="btn btn-edit" onclick="startEdit('${key}',${i})">✏️ 수정</button>`}
          ${isC?`<button class="btn btn-del" onclick="delCustom('${s.id}',${i-orig})">삭제</button>`:''}
        </div>
      </div>
    </div>`;
  });
  html+=`<button class="btn-add-tpl" onclick="addCustomTpl()">＋ 템플릿 추가</button>`;
  document.getElementById('stageContent').innerHTML=html;
}

function copyTpl(key,idx){
  const s=STAGES[curStage];
  const raw=(editState[key]!==undefined)?editState[key]:allTpls(s)[idx].body;
  const text=applyVars(raw);
  navigator.clipboard.writeText(text).then(()=>toast('복사됐어요 📋')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('복사됐어요 📋');
  });
}
function openSms(key,idx){
  const s=STAGES[curStage];
  const raw=(editState[key]!==undefined)?editState[key]:allTpls(s)[idx].body;
  const text=applyVars(raw);
  const phone=document.getElementById('v_phone').value.replace(/-/g,'');
  window.location.href=`sms:${phone}${/iPhone|iPad/.test(navigator.userAgent)?'&':'?'}body=${encodeURIComponent(text)}`;
}
function startEdit(key,idx){
  editState[key]=allTpls(STAGES[curStage])[idx].body;
  renderStage();
  const b=document.getElementById('body-'+key);if(b)b.classList.add('open');
  const t=document.getElementById('tog-'+key);if(t)t.classList.add('open');
  const ta=document.getElementById('edit-'+key);if(ta){ta.focus();ta.value=editState[key];}
}
function cancelEdit(key){delete editState[key];renderStage();}
function saveEdit(key,idx){
  const s=STAGES[curStage];const orig=s.templates.length;
  const ta=document.getElementById('edit-'+key);
  const ti=document.getElementById('etitle-'+key);
  if(!ta)return;
  const txt=ta.value;
  if(idx<orig){s.templates[idx].body=txt;if(ti)s.templates[idx].title=ti.value||s.templates[idx].title;}
  else{const ci=idx-orig;if(customs[s.id]&&customs[s.id][ci]){customs[s.id][ci].body=txt;if(ti)customs[s.id][ci].title=ti.value||customs[s.id][ci].title;}}
  delete editState[key];saveTplStorage();renderStage();toast('저장됐어요 ✓');
}
function delCustom(sid,ci){
  if(customs[sid])customs[sid].splice(ci,1);
  saveTplStorage();renderStage();toast('삭제됐어요');
}
function addCustomTpl(){
  const s=STAGES[curStage];
  (customs[s.id]=customs[s.id]||[]).push({title:'새 템플릿',body:'내용을 입력하세요.'});
  saveTplStorage();renderStage();
  const idx=allTpls(s).length-1;
  const key=`${s.id}-${idx}`;
  startEdit(key,idx);
}

function clearForm(){
  document.getElementById('v_name').value='';
  document.getElementById('v_phone').value='';
  document.getElementById('v_checkin').value='';
  document.getElementById('v_checkout').value='';
  document.getElementById('v_guests').value='';
  document.getElementById('v_price').value='';
  _cal.ci=null;_cal.co=null;
  editState={};
  _updateDateDisplay();renderStage();
}

const _MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let _cal={ci:null,co:null,step:'ci',y:0,m:0};
function openDatePicker(){
  const today=new Date();
  _cal.y=today.getFullYear();_cal.m=today.getMonth();
  _cal.ci=document.getElementById('v_checkin').value||null;
  _cal.co=document.getElementById('v_checkout').value||null;
  _cal.step='ci';_renderCal();
}
function _renderCal(){
  const y=_cal.y,m=_cal.m;
  const today=new Date().toISOString().slice(0,10);
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const DOW=['일','월','화','수','목','금','토'];
  let g=DOW.map(d=>`<div style="text-align:center;font-size:11px;font-weight:600;color:var(--ink-light);padding:4px 0;">${d}</div>`).join('');
  for(let i=0;i<first;i++)g+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isCi=ds===_cal.ci,isCo=ds===_cal.co;
    const inRange=_cal.ci&&_cal.co&&ds>_cal.ci&&ds<_cal.co;
    const isPast=ds<today;
    let bg=isCi||isCo?'var(--accent)':inRange?'rgba(255,107,74,0.12)':'transparent';
    let color=isCi||isCo?'white':isPast?'#C7C7CC':'var(--ink)';
    const dow=(first+d-1)%7;
    if(!isCi&&!isCo&&!isPast){if(dow===0)color='#EF4444';else if(dow===6)color='#007AFF';}
    g+=`<div onclick="${isPast?'':'_calPick(\''+ds+'\')'}" style="text-align:center;padding:8px 2px;border-radius:50%;background:${bg};color:${color};font-size:14px;font-weight:${isCi||isCo?700:400};cursor:${isPast?'default':'pointer'};">${d}</div>`;
  }
  const hint=_cal.step==='ci'?'입실 날짜를 선택하세요':'퇴실 날짜를 선택하세요';
  const ciTxt=_cal.ci?_cal.ci.slice(5).replace('-','/')+'(입실)':'미선택';
  const coTxt=_cal.co?_cal.co.slice(5).replace('-','/')+'(퇴실)':'미선택';
  document.getElementById('_calModal').innerHTML=`
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;">
    <div style="background:white;border-radius:24px 24px 0 0;width:100%;padding:20px 16px 36px;max-height:85vh;overflow-y:auto;">
      <div style="width:36px;height:4px;background:#D1D1D6;border-radius:2px;margin:0 auto 16px;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <button onclick="_calNav(-1)" style="background:none;border:none;font-size:24px;cursor:pointer;padding:4px 12px;color:var(--ink);">‹</button>
        <span style="font-weight:700;font-size:16px;">${y}년 ${_MN[m]}</span>
        <button onclick="_calNav(1)" style="background:none;border:none;font-size:24px;cursor:pointer;padding:4px 12px;color:var(--ink);">›</button>
      </div>
      <p style="text-align:center;font-size:12px;color:var(--accent);font-weight:700;margin-bottom:14px;">${hint}</p>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;">${g}</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">
        <span style="font-size:13px;background:var(--bg);padding:7px 14px;border-radius:20px;">${ciTxt}</span>
        <span style="font-size:14px;color:var(--ink-light);align-self:center;">→</span>
        <span style="font-size:13px;background:var(--bg);padding:7px 14px;border-radius:20px;">${coTxt}</span>
      </div>
      <div style="display:flex;gap:10px;">
        ${_cal.ci&&_cal.co?`<button onclick="_calConfirm()" style="flex:1;padding:14px;background:linear-gradient(135deg,#FF6B4A,#FF8C6B);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 12px rgba(255,107,74,.3);">확인</button>`:''}
        <button onclick="document.getElementById('_calModal').innerHTML=''" style="flex:1;padding:14px;background:var(--bg);color:var(--ink-light);border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">취소</button>
      </div>
    </div></div>`;
}
function _calPick(ds){
  if(_cal.step==='ci'){_cal.ci=ds;_cal.co=null;_cal.step='co';}
  else{if(ds<=_cal.ci){_cal.ci=ds;_cal.co=null;_cal.step='co';}else{_cal.co=ds;}}
  _renderCal();
}
function _calNav(d){_cal.m+=d;if(_cal.m<0){_cal.m=11;_cal.y--;}else if(_cal.m>11){_cal.m=0;_cal.y++;}_renderCal();}
function _calConfirm(){
  document.getElementById('v_checkin').value=_cal.ci||'';
  document.getElementById('v_checkout').value=_cal.co||'';
  document.getElementById('_calModal').innerHTML='';
  _updateDateDisplay();renderStage();
}
function _updateDateDisplay(){
  const ci=document.getElementById('v_checkin').value;
  const co=document.getElementById('v_checkout').value;
  const btn=document.getElementById('dateRangeBtn');
  if(!btn)return;
  const DOW=['일','월','화','수','목','금','토'];
  function fmt(ds){const d=new Date(ds+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일(${DOW[d.getDay()]})`;}
  if(ci&&co){
    const n=Math.round((new Date(co)-new Date(ci))/86400000);
    btn.innerHTML=`<div class="drb-side ci"><span class="drb-label">📅 입실</span><span class="drb-date">${fmt(ci)}</span></div><div class="drb-mid"><span class="drb-arrow">→</span><span class="drb-nights">${n}박</span></div><div class="drb-side"><span class="drb-label">🚪 퇴실</span><span class="drb-date">${fmt(co)}</span></div>`;
  } else if(ci){
    btn.innerHTML=`<div class="drb-side ci"><span class="drb-label">📅 입실</span><span class="drb-date">${fmt(ci)}</span></div><div class="drb-mid"><span class="drb-arrow">→</span></div><div class="drb-side"><span class="drb-label" style="color:#C7C7CC;">🚪 퇴실</span><span class="drb-date" style="color:#C7C7CC;font-size:13px;">미선택</span></div>`;
  } else {
    btn.innerHTML=`<div class="drb-placeholder">📅 날짜를 선택하세요</div>`;
  }
}

function openSettings(){
  document.getElementById('cfg_name').value=settings.name||'';
  document.getElementById('cfg_addr').value=settings.addr||'';
  document.getElementById('cfg_account').value=settings.account||'';
  document.getElementById('cfg_wifi').value=settings.wifi||'';
  document.getElementById('cfg_wifipw').value=settings.wifipw||'';
  document.getElementById('cfg_door').value=settings.door||'';
  document.getElementById('cfg_door_auto').checked=!!settings.doorAuto;
  document.getElementById('cfg_door').disabled=!!settings.doorAuto;
  document.getElementById('cfg_pw').value=fmtPriceVal(settings.pw||'');
  document.getElementById('cfg_pwe').value=fmtPriceVal(settings.pwe||'');
  document.getElementById('setOverlay').classList.add('open');
  document.getElementById('setPanel').classList.add('open');
}
function closeSettings(){
  document.getElementById('setOverlay').classList.remove('open');
  document.getElementById('setPanel').classList.remove('open');
}
function saveSettings(){
  settings={
    name:document.getElementById('cfg_name').value.trim(),
    addr:document.getElementById('cfg_addr').value.trim(),
    account:document.getElementById('cfg_account').value.trim(),
    wifi:document.getElementById('cfg_wifi').value.trim(),
    wifipw:document.getElementById('cfg_wifipw').value.trim(),
    door:document.getElementById('cfg_door').value.trim(),
    doorAuto:document.getElementById('cfg_door_auto').checked,
    pw:document.getElementById('cfg_pw').value.trim(),
    pwe:document.getElementById('cfg_pwe').value.trim(),
  };
  localStorage.setItem(SK_SET,JSON.stringify(settings));
  closeSettings();
  toast('저장됐어요 ✓');
  renderStage();
}
function toggleDoorAuto(){
  const chk=document.getElementById('cfg_door_auto').checked;
  const inp=document.getElementById('cfg_door');
  inp.disabled=chk;
  if(chk)inp.value='';
}
function confirmResetSettings(){
  showConfirmModal('설정 초기화','모든 설정이 삭제됩니다. 계속하시겠어요?',()=>{
    settings={name:'',addr:'',account:'',wifi:'',wifipw:'',door:'',doorAuto:false,pw:'',pwe:''};
    localStorage.removeItem(SK_SET);
    ['cfg_name','cfg_addr','cfg_account','cfg_wifi','cfg_wifipw','cfg_door','cfg_pw','cfg_pwe'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('cfg_door_auto').checked=false;
    document.getElementById('cfg_door').disabled=false;
    toast('설정이 초기화됐어요');renderStage();
  });
}


function exportData(){
  const data={
    settings:JSON.parse(localStorage.getItem(SK_SET)||'{}'),
    tpl:JSON.parse(localStorage.getItem(SK_TPL)||'{}'),
    exported:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`solsoop_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('내보내기 완료 📤');
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.settings)localStorage.setItem(SK_SET,JSON.stringify(data.settings));
      if(data.tpl)localStorage.setItem(SK_TPL,JSON.stringify(data.tpl));
      loadAll();
      openSettings();
      renderStage();
      toast('가져오기 완료 ✅');
    }catch(err){
      toast('파일이 올바르지 않아요 ❌');
    }
    input.value='';
  };
  reader.readAsText(file);
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}
function showConfirmModal(title,msg,onOk,onCancel,okTxt='확인',cancelTxt='취소'){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOk').textContent=okTxt;
  document.getElementById('confirmCancel').textContent=cancelTxt;
  document.getElementById('confirmOk').onclick=()=>{document.getElementById('confirmModal').classList.remove('open');onOk&&onOk();};
  document.getElementById('confirmCancel').onclick=()=>{document.getElementById('confirmModal').classList.remove('open');onCancel&&onCancel();};
  document.getElementById('confirmModal').classList.add('open');
}

loadAll();
buildTabs();
renderStage();

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('_calModal').innerHTML)document.getElementById('_calModal').innerHTML='';
    else if(document.getElementById('setPanel').classList.contains('open'))closeSettings();
    else if(document.getElementById('confirmModal').classList.contains('open'))document.getElementById('confirmModal').classList.remove('open');
  }
  if(e.key==='Enter'){
    if(_cal.ci&&_cal.co&&document.getElementById('_calModal').innerHTML)_calConfirm();
  }
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// PWA 설치 프롬프트
let _installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_installPrompt=e;});
async function installApp(){
  if(_installPrompt){
    _installPrompt.prompt();
    const r=await _installPrompt.userChoice;
    _installPrompt=null;
    if(r.outcome==='accepted')toast('홈 화면에 추가됐어요 📲');
  } else {
    const isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
    if(isIos){
      showConfirmModal('홈 화면에 추가 (iOS)','Safari에서 하단 공유 버튼(□↑)을 탭한 후\n"홈 화면에 추가"를 선택하세요.',null,null,'확인','');
    } else {
      showConfirmModal('홈 화면에 추가','이미 설치되어 있거나 이 브라우저에서는\n자동 설치가 지원되지 않아요.\n\n브라우저 메뉴 → "홈 화면에 추가"를 이용해 주세요.',null,null,'확인','');
    }
  }
}
